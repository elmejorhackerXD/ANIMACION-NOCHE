<html>
  <head>
    <title>Lenguajes web</title>
    <style>
      * {
        padding: 0px;
        margin: 0px;
      }

      .contenedor {
        background-color: teal;
        margin: 0 auto;
        width: 1100px;
        height: 400px;
        border: 2px solid teal;
        border-radius: 10px;
        position: relative;
        overflow: visible;
      }

      .tarjeta1,
      .tarjeta2,
      .tarjeta3 {
        width: 200px;
        height: 300px;
        position: absolute;
        top: -300px;
        background-size: cover;
      }

      .tarjeta1 {
        left: 50px;
        animation: tarjeta1 3s 1 forwards;
        animation-delay: 0s;
      }

      .tarjeta2 {
        left: 450px;
        animation: tarjeta2 3s 1 forwards;
        animation-delay: 3s;
      }

      .tarjeta3 {
        left: 850px;
        animation: tarjeta3 3s 1 forwards;
        animation-delay: 6s;
      }

      @keyframes tarjeta1 {
        0% {
          top: -300px;
          transform: rotateY(180deg);
        }
        50% {
          top: 300px;
        }
        100% {
          top: 50px;
        }
      }

      @keyframes tarjeta2 {
        0% {
          top: 600px;
          transform: rotateX(180deg);
        }
        50% {
          top: -300px;
        }
        100% {
          top: 50px;
        }
      }

      @keyframes tarjeta3 {
        0% {
          left: 1200px;
          top: 50px;
          transform: rotate(180deg);
        }
        100% {
          left: 850px;
          top: 50px;
        }
      }

      .html {
        text-align: center;
        color: white;
        font-family: Arial, sans-serif;
        padding-top: 15px;
        letter-spacing: 3px;
        position: relative;
        z-index: 10;
      }

      /* EVENTOS */
      .tarjeta1:hover,
      .tarjeta2:hover,
      .tarjeta3:hover {
        transition: 1s;
        scale: 1.2;
        z-index: 0;
      }
      footer {
        position: absolute;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <div class="html"><h1>ESTILOS DE ANIMACION</h1></div>
      <a href="https://developer.mozilla.org/es/docs/Web/HTML" target="_blank">
        <img src="img/html.png" class="tarjeta1" />
      </a>

      <a href="https://developer.mozilla.org/es/docs/Web/CSS" target="_blank">
        <img src="img/css.png" class="tarjeta2" />
      </a>

      <a
        href="https://developer.mozilla.org/es/docs/Web/JavaScript"
        target="_blank"
      >
        <img src="img/js.png" class="tarjeta3" />
      </a>
    </div>
    <footer>
      <button
        onclick="history.back()"
        style="font-size: 20px; padding: 15px 30px"
      >
        ← Volver
      </button>
    </footer>
  </body>
</html>
