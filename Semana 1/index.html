<!doctype html>
<html>
  <head>
    <title>Tablero de Ajedrez</title>
    <style>
      body {
        background: #1a1a1a; /* gris oscuro, casi negro */
        color: #f0ece3; /* texto claro */
      }
      table {
        border-collapse: collapse;
        margin: 50px auto;
        border: 3px solid #5a3a1a;
      }

      td {
        width: 60px;
        height: 60px;
      }

      .blanca {
        background-color: #f0d9b5;
      }

      .negra {
        background-color: #b58863;
      }
      footer {
        position: absolute;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
      </tr>

      <tr>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
      </tr>

      <tr>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
      </tr>

      <tr>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
      </tr>

      <tr>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
      </tr>

      <tr>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
      </tr>

      <tr>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
      </tr>

      <tr>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
      </tr>
    </table>
    <footer>
      <button
        onclick="history.back()"
        style="font-size: 20px; padding: 15px 30px"
      >
        ← Volver
      </button>
    </footer>
  </body>
</html>
